<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Typing Battle ESports</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
</head>

<body>

<!-- ================= BACKGROUND ================= -->
<div class="bg"></div>

<!-- ================= MENU SCREEN ================= -->
<div class="screen menu-screen">

  <div class="card">

    <h1>⚡ Typing Battle</h1>
    <p>Select Game Mode</p>

    <button onclick="startSolo()">🎯 Solo Mode</button>

    <button onclick="findMatch()">⚔️ Multiplayer Ranked</button>

    <div class="small-info">
      🏆 MMR: <span id="mmr">1200</span>
    </div>

  </div>

</div>

<!-- ================= QUEUE SCREEN ================= -->
<div class="screen queue-screen hidden">

  <div class="card">

    <h1>🔎 Finding Opponent...</h1>

    <div class="loader"></div>

    <p>Please wait...</p>

    <button onclick="cancelMatch()">Cancel</button>

  </div>

</div>

<!-- ================= VS SCREEN ================= -->
<div class="screen vs-screen hidden">

  <div class="vs-container">

    <div class="player-card left">

      <div class="badge" id="p1Rank">Bronze</div>
      <h2>YOU</h2>
      <p id="p1Mmr">1200</p>

    </div>

    <div class="vs-text">VS</div>

    <div class="player-card right">

      <div class="badge" id="p2Rank">Silver</div>
      <h2>OPPONENT</h2>
      <p id="p2Mmr">1200</p>

    </div>

  </div>

</div>

<!-- ================= GAME SCREEN ================= -->
<div class="screen game-screen hidden">

  <div class="hud">

    <div>Score: <span class="score">0</span></div>
    <div>Time: <span class="time">10</span>s</div>
    <div>Level: <span class="level-display">1</span></div>
    <div>🔥 Combo: <span class="combo-display">0</span></div>

  </div>

  <div class="game-box">

    <h1 class="word">---</h1>

    <input id="input" placeholder="type here..." autocomplete="off">

    <button onclick="leaveGame()">Leave</button>

  </div>

</div>

<!-- ================= RESULT SCREEN ================= -->
<div class="screen result-screen hidden">

  <div class="card">

    <h1 id="resultTitle">🏆 Result</h1>

    <p>Score: <span class="score">0</span></p>

    <p id="rankChange">MMR +0</p>

    <button onclick="backToMenu()">Back to Menu</button>

    <button onclick="findMatch()">Play Again</button>

  </div>

</div>

<!-- ================= SOLO SCREEN (OPTIONAL FLOW USE SAME GAME SCREEN) ================= -->
<!-- SOLO MODE USES GAME SCREEN -->

<!-- ================= SCRIPT ================= -->
<script src="firebase-config.js"></script>
<script src="script.js"></script>

</body>
</html>
